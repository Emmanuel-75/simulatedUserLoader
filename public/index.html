<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <!-- GDGoCBowen30DayChallenge Day 18  -->
    <title>Simulated User Loader</title>
  </head>
  <body
    class="font-['DM_Mono'] h-screen flex justify-center items-center bg-gradient-to-r from-blue-50 from-indigo-50 font-bold"
  >
    <section
      class="min-h-50 w-[80%] md:w-[40%] bg-gradient-to-r from-indigo-300 to-blue-300 rounded-xl shadow-xl p-10 flex flex-col gap-6"
    >
      <div class="flex justify-between">
        <button class="callbacksBtn btnOn">Callbacks</button>
        <button class="promisesBtn btnOff">Promises</button>
      </div>
      <button
        class="bg-indigo-500 w-fit py-2 px-8 rounded-xl text-xl text-white self-center border-4 border-blue-900 hover:bg-blue-700 cursor-pointer hover:scale-105 fetchBtn"
      >
        Fetch data
      </button>
      <div class="status min-h-50 border-4 border-blue-600 rounded-xl p-4">
        <div class="loadingPhase loading hidden">
            <div class="border-4 w-8 h-8 border-t-0 rounded-2xl animate-spin mr-3">
            </div>
            <p class="text-2xl">Loading</p>
        </div>
        <p class="errorMsg hidden text-red-700 text-center text-lg"></p>
        <div class="loadedData hidden">
          <h1 class="text-xl uppercase text-center username"></h1>
          <p class="text-lg mt-2">Posts:</p>
          <ul class="px-4 flex flex-col gap-4">
            <li class="flex flex-col justify-between">
              <span class="post1"></span>
              <p class="flex gap-3">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="24"
                  height="24"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  class="lucide lucide-thumbs-up-icon lucide-thumbs-up"
                >
                  <path
                    d="M15 5.88 14 10h5.83a2 2 0 0 1 1.92 2.56l-2.33 8A2 2 0 0 1 17.5 22H4a2 2 0 0 1-2-2v-8a2 2 0 0 1 2-2h2.76a2 2 0 0 0 1.79-1.11L12 2a3.13 3.13 0 0 1 3 3.88Z"
                  />
                  <path d="M7 10v12" />
                </svg>
                : <span class="amountOfLikes1"></span>
              </p>
            </li>
            <li class="flex flex-col justify-between">
              <span class="post2"></span>
              <p class="flex gap-3">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="24"
                  height="24"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  class="lucide lucide-thumbs-up-icon lucide-thumbs-up"
                >
                  <path
                    d="M15 5.88 14 10h5.83a2 2 0 0 1 1.92 2.56l-2.33 8A2 2 0 0 1 17.5 22H4a2 2 0 0 1-2-2v-8a2 2 0 0 1 2-2h2.76a2 2 0 0 0 1.79-1.11L12 2a3.13 3.13 0 0 1 3 3.88Z"
                  />
                  <path d="M7 10v12" />
                </svg>
                : <span class="amountOfLikes2"></span>
              </p>
            </li>
          </ul>
        </div>
      </div>
    </section>
    <script src="script.js"></script>
  </body>
</html>
